<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Password – CareerSprint</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#7C5CFC;--pink:#F74B8B}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#ede8ff 0%,#fce4f0 50%,#ffe8d6 100%);padding:20px}
.card{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.logo{font-family:'Manrope',sans-serif;font-weight:900;font-size:22px;color:var(--purple);margin-bottom:32px;display:block;text-decoration:none}
.logo span{color:var(--pink)}
h1{font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;color:#0f0f1a;margin-bottom:8px}
.sub{font-size:14px;color:#6b7280;margin-bottom:32px}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;color:#0f0f1a}
input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,92,252,.1)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">Career<span>Sprint</span>•</a>
  <h1>Set new password</h1>
  <p class="sub">Enter your new password below</p>
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
  <div class="form-group">
    <label>New Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" />
  </div>
  <div class="form-group">
    <label>Confirm New Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password" />
  </div>
  <button class="btn" id="updateBtn" onclick="handleUpdate()">Update Password →</button>
</div>

<script>
const sbClient = window.supabase.createClient(
  'https://jxtcprqmmiwiljsjpoiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4dGNwcnFtbWl3aWxqc2pwb2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjY3MzgsImV4cCI6MjA5MjIwMjczOH0.hVXVNagzHq8Q2eYbM9nw3tsjfZEwVu99i_BB6uryLtk'
);

function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';document.getElementById('successMsg').style.display='none'}
function showSuccess(msg){const el=document.getElementById('successMsg');el.textContent=msg;el.style.display='block';document.getElementById('errorMsg').style.display='none'}

async function handleUpdate(){
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('updateBtn');
  if(!password || !confirm) return showError('Please fill in both fields.');
  if(password.length < 8) return showError('Password must be at least 8 characters.');
  if(password !== confirm) return showError('Passwords do not match.');
  btn.disabled = true; btn.textContent = 'Updating...';
  const { error } = await sbClient.auth.updateUser({ password });
  if(error){ showError(error.message); btn.disabled=false; btn.textContent='Update Password →'; }
  else {
    showSuccess('✅ Password updated! Redirecting to login...');
    setTimeout(()=>window.location.href='login.html', 2000);
  }
}
</script>
</body>
</html>
