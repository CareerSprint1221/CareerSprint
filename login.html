<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In – CareerSprint</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(135deg,#ede8ff 0%,#fce4f0 50%,#ffe8d6 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.logo{font-family:'Manrope',sans-serif;font-weight:900;font-size:22px;color:#7C5CFC;margin-bottom:32px;display:block;text-decoration:none}
.logo span{color:#F74B8B}
h1{font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;color:#0f0f1a;margin-bottom:8px}
p.sub{font-size:14px;color:#6b7280;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;color:#0f0f1a}
input:focus{border-color:#7C5CFC;box-shadow:0 0 0 3px rgba(124,92,252,.12)}
.forgot{text-align:right;margin-top:-14px;margin-bottom:20px}
.forgot a{font-size:12px;color:#7C5CFC;text-decoration:none;font-weight:600}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#7C5CFC,#F74B8B);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,92,252,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#9ca3af;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.btn-google{width:100%;padding:12px;background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s,box-shadow .15s}
.btn-google:hover{border-color:#7C5CFC;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.signup-link{text-align:center;margin-top:24px;font-size:14px;color:#6b7280}
.signup-link a{color:#7C5CFC;font-weight:700;text-decoration:none}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">Career<span>Sprint</span>•</a>
  <h1>Welcome back!</h1>
  <p class="sub">Log in to continue your job search</p>

  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="alex@example.com" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" />
  </div>
  <div class="forgot"><a href="#">Forgot password?</a></div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">Log In →</button>

  <div class="divider">or</div>

  <button class="btn-google" onclick="handleGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continue with Google
  </button>

  <p class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></p>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://jxtcprqmmiwiljsjpoiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4dGNwcnFtbWl3aWxqc2pwb2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjY3MzgsImV4cCI6MjA5MjIwMjczOH0.hVXVNagzHq8Q2eYbM9nw3tsjfZEwVu99i_BB6uryLtk'
);

function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';document.getElementById('successMsg').style.display='none'}
function showSuccess(msg){const el=document.getElementById('successMsg');el.textContent=msg;el.style.display='block';document.getElementById('errorMsg').style.display='none'}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) return showError('Please fill in all fields.');

  btn.disabled = true; btn.textContent = 'Logging in...';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    showError(error.message);
    btn.disabled = false; btn.textContent = 'Log In →';
  } else {
    showSuccess('Logged in! Redirecting to your dashboard...');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  }
}

async function handleGoogle() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
}

// If already logged in, redirect to dashboard
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
